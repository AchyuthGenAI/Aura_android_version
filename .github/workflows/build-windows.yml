name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - achyuth
    paths:
      - ".github/workflows/build-windows.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "src/**"
      - "tsup.config.ts"
      - "vite.config.*"

jobs:
  package-windows:
    name: Package Windows NSIS
    runs-on: windows-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: aura-desktop
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: aura-desktop

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Same approach as the mac workflow: stage-openclaw-runtime.ts expects
      # ../openclaw-src as a sibling with prebuilt dist/ + assets/ + skills/.
      # The npm tarball already ships that exact layout, so use it instead of
      # cloning + building from source.
      - name: Fetch prebuilt OpenClaw runtime from npm
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p openclaw-src
          cd openclaw-src
          npm pack openclaw@latest --silent
          tar --strip-components=1 -xzf openclaw-*.tgz
          rm -f openclaw-*.tgz
          ls -la | head -15

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build NSIS installer
        run: npm run package:win

      - name: Upload Windows installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aura-desktop-windows-setup
          path: aura-desktop/dist/Aura Desktop Setup *.exe
          if-no-files-found: warn

      - name: Upload Windows unpacked dir
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aura-desktop-windows-unpacked
          path: aura-desktop/dist/win-unpacked/**
          if-no-files-found: warn
