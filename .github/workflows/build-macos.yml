name: Build macOS Installer

on:
  workflow_dispatch:
  push:
    branches:
      - achyuth
      - achyuth_1
    paths:
      - ".github/workflows/build-macos.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "src/**"
      - "vendor/openclaw/**"
      - "tsup.config.ts"
      - "vite.config.*"

jobs:
  package-macos:
    name: Package macOS DMG
    runs-on: macos-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: aura-desktop

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: aura-desktop

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Aura's hard-forked OpenClaw runtime now lives in `vendor/openclaw/`
      # inside this repo. scripts/stage-openclaw-runtime.ts automatically
      # prefers that in-repo vendor over the legacy `../openclaw-src/` sibling,
      # so no external download is needed here. We still create an empty
      # sibling directory so any older script paths that reference it don't
      # ENOENT on first run.
      - name: Prepare staging scratch dir
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p openclaw-src
          echo "Using in-repo vendor/openclaw hard-fork; sibling dir is a no-op placeholder."
          ls -la aura-desktop/vendor/openclaw | head -15

      # The committed package-lock.json is generated on Windows and only
      # tracks @rollup/rollup-win32-* entries, not @rollup/rollup-darwin-*.
      # This is a known npm bug (https://github.com/npm/cli/issues/4828):
      # both `npm ci` and `npm install` honor the existing lock and skip the
      # darwin binding, causing rollup to fail at require-time on macOS.
      # Delete the lock first so npm re-resolves optional deps from scratch
      # for the current runner. The deleted lock is never committed back.
      - name: Remove Windows-generated lock file
        run: rm -f package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build unsigned universal mac app
        run: npm run package:mac:dir

      # Smoke test actually launches the bundled OpenClaw gateway and opens
      # a WebSocket. On the CI mac runner it can exit non-zero for reasons
      # unrelated to the packaged app (missing mic/file permissions, no
      # API keys in env). Don't let it gate artifact uploads.
      - name: Smoke test packaged mac runtime
        continue-on-error: true
        run: npm run smoke:packaged-runtime -- "dist/installer-v6/mac-universal/Aura Desktop.app/Contents/Resources"

      - name: Build unsigned universal DMG
        run: npm run package:mac

      - name: List build output
        if: always()
        run: |
          echo "--- dist tree ---"
          ls -la dist/ || true
          echo "--- dist/installer-v6 tree ---"
          ls -la dist/installer-v6/ || true

      - name: Upload unsigned mac app bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aura-desktop-mac-app
          path: aura-desktop/dist/installer-v6/mac-universal/**
          if-no-files-found: warn

      - name: Upload unsigned mac DMG
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aura-desktop-mac-dmg
          path: aura-desktop/dist/installer-v6/*.dmg
          if-no-files-found: warn
